# Profile Manifest — Brand → Chrome Instance Mapping
# Each brand has its own Chrome instance with persistent login sessions.
# Connect via: agent-browser connect <cdp_port>

version: 1

brands:
  tableclay:
    display_name: "TableClay"
    cdp_port: 9222
    systemd_service: chrome-tableclay
    data_dir: /data/chrome-profiles/tableclay
    platforms:
      instagram:
        handle: "Table.clay"
        url: "https://www.instagram.com/"
        auth_status: active
      facebook:
        handle: "tableclay"
        url: "https://www.facebook.com/"
        auth_status: active
      tiktok:
        handle: "Table.clay"
        url: "https://www.tiktok.com/"
        auth_status: rate_limited
    vault_brand_context: "Projects/Ecommerce/Business/TableClay/Brand/"

  preppack:
    display_name: "PrepPack"
    cdp_port: 9223
    systemd_service: chrome-preppack
    data_dir: /data/chrome-profiles/preppack
    platforms:
      instagram:
        handle: "Thepreppack"
        url: "https://www.instagram.com/"
        auth_status: pending
      facebook:
        handle: "PrepPack"
        url: "https://www.facebook.com/"
        auth_status: pending
      tiktok:
        handle: "prep_pack"
        url: "https://www.tiktok.com/"
        auth_status: pending
    vault_brand_context: "Projects/Ecommerce/Business/PrepPack/Brand/"
